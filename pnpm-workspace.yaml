# Approve build scripts only for trusted toolchain packages (esbuild/workerd power
# the Vite + Wrangler build, sharp backs Lighthouse image handling, lefthook installs
# the git hooks). Everything else stays sandboxed.
allowBuilds:
  esbuild: true
  lefthook: true
  sharp: true
  workerd: true

# pnpm 11 defaults minimumReleaseAge to 1440 (1 day), enforced against every
# transitive dep on every install. This toolchain (Vite 8 / rolldown /
# workerd) publishes daily, so the default makes a fresh `pnpm install`
# fail nondeterministically depending on the calendar date — verified: a
# clean install failed here on both a 7-day custom cooldown and pnpm's
# 1-day default. The lockfile's pinned versions + integrity hashes already
# make tampering detectable; disable the age gate rather than ship a
# scaffold whose install can break on any given day.
minimumReleaseAge: 0 # nosemgrep
