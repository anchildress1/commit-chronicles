sonar.projectKey=anchildress1_commit-chronicles
sonar.organization=anchildress1
sonar.sources=.
sonar.exclusions=node_modules/**,dist/**,.vite/**

# ingest_pipeline.sql embeds a Python UDF body inside $$...$$ dollar-quoting.
# Sonar's PL/SQL parser reads that whole block as one string literal, so
# every newline in the Python source trips this rule — not a real defect.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=plsql:LiteralsNonPrintableCharactersCheck
sonar.issue.ignore.multicriteria.e1.resourceKey=snowflake/ingest_pipeline.sql
