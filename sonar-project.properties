sonar.projectKey=anchildress1_commit-chronicles
sonar.organization=anchildress1
sonar.sources=.
sonar.exclusions=node_modules/**,dist/**,.vite/**

# Snowflake SQL is not Oracle PL/SQL, but plsql is the only analyzer Sonar has for
# .sql, so it applies Oracle grammar to files that never claimed to follow it. The
# rules below are dialect errors, not defects. Scoped to snowflake/** so a genuine
# PL/SQL file elsewhere would still be checked.
sonar.issue.ignore.multicriteria=e1,e2,e3

# $$...$$ dollar-quoted bodies (a Python UDF, a multi-line PARSE_JSON schema) read as
# one string literal, so every newline inside them trips as a non-printable character.
sonar.issue.ignore.multicriteria.e1.ruleKey=plsql:LiteralsNonPrintableCharactersCheck
sonar.issue.ignore.multicriteria.e1.resourceKey=snowflake/**/*.sql

# Snowflake STRING is unsized by design. Oracle's mandatory VARCHAR2(n) has no analogue.
sonar.issue.ignore.multicriteria.e2.ruleKey=plsql:SizeConstraintMissingCheck
sonar.issue.ignore.multicriteria.e2.resourceKey=snowflake/**/*.sql

# The "duplicated literals" are OBJECT_CONSTRUCT key names repeated across storyline
# views. SQL has no constants to extract them into.
sonar.issue.ignore.multicriteria.e3.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.e3.resourceKey=snowflake/**/*.sql

# No test runner emits coverage for warehouse DDL. Left in, new_coverage reads 0% and
# fails the gate on a metric nothing in this repo can move.
sonar.coverage.exclusions=snowflake/**/*.sql
